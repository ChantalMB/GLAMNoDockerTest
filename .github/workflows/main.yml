name: Deploy to GitHub Pages
on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@master

    - name: Deploy Scraping
      uses: s0/git-publish-subdir-action@develop
      env:
        REPO: self
        BRANCH: scraping
        FOLDER: Scraping
        GITHUB_TOKEN: ${{ secrets.API_TOKEN_GITHUB }}
        MESSAGE: "Updating {target-branch} from main"

    - name: Deploy Sonification
      uses: s0/git-publish-subdir-action@develop
      env:
        REPO: self
        BRANCH: sonification
        FOLDER: Sonification
        GITHUB_TOKEN: ${{ secrets.API_TOKEN_GITHUB }}
        MESSAGE: "Updating {target-branch} from main"