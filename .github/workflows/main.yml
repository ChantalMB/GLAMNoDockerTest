name: Push File

on: push

jobs:
  copy-file:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v2

    - name: Pushes test file
      uses: dmnemec/copy_file_to_another_repo_action@main
      env:
        API_TOKEN_GITHUB: ${{ secrets.API_TOKEN_GITHUB }}
      with:
        source_file: '"Agent-based Models/"'
        destination_repo: 'ChantalMB/ActionsTest'
        destination_folder: '/'
        user_email: 'chantalbrousseau@rogers.com'
        user_name: 'ChantalMB'
        commit_message: 'Testing GH actions'
        